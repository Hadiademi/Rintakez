<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier — Design Canvas</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="theme.css">

<script src="https://cdn.tailwindcss.com"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper:        'rgb(var(--paper-rgb) / <alpha-value>)',
          ink:          'rgb(var(--ink-rgb) / <alpha-value>)',
          mute:         'rgb(var(--mute-rgb) / <alpha-value>)',
          accent:       'rgb(var(--accent-rgb) / <alpha-value>)',
          line:         'rgb(var(--line-rgb) / <alpha-value>)',
          surface:      'rgb(var(--surface-rgb) / <alpha-value>)',
          chip:         'rgb(var(--chip-rgb) / <alpha-value>)',
        },
        fontFamily: { sans: ['"Inter Tight"', 'system-ui', 'sans-serif'] },
        letterSpacing: { 'display': '-0.025em', 'tight2': '-0.015em', 'label': '0.12em' },
      }
    }
  };
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="client-screens.jsx"></script>
<script type="text/babel" src="photog-screens.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="canvas.jsx"></script>
</body>
</html>
